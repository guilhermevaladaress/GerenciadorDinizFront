<div class="login-wrapper">

  <div class="login-card">

    <div class="logo-area">
      <img src="images/logo/logo-final.png" alt="Diniz Assessoria Contábil" class="logo" />
    </div>

    <div class="form-area">
      <h1 class="titulo">Login</h1>

      <div class="campo">
        <label for="email">Email:</label>
        <input
          id="email"
          type="email"
          placeholder="email@dominio.com"
          [(ngModel)]="dto.email"
          [class.input-erro]="erro"
          autocomplete="email"
        />
      </div>

      <div class="campo">
        <label for="senha">Senha:</label>
        <div class="input-senha-wrapper">
          <input
            id="senha"
            [type]="senhaVisivel ? 'text' : 'password'"
            placeholder="••••••••"
            [(ngModel)]="dto.senha"
            [class.input-erro]="erro"
            autocomplete="current-password"
          />
          <button class="btn-toggle-senha" type="button" (click)="toggleSenha()">
            <svg *ngIf="!senhaVisivel" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="senhaVisivel" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      @if (erro) {
        <p class="mensagem-erro">{{ erro }}</p>
      }

      <button
        class="btn-entrar"
        type="button"
        (click)="entrar()"
        [disabled]="carregando || !dto.email || !dto.senha"
      >
        @if (carregando) {
          <span class="spinner"></span>
        } @else {
          Entrar
        }
      </button>
    </div>

  </div>

  <div class="rodape">
    <span>© 2025 Diniz Assessoria Contábil</span>
  </div>

</div>
